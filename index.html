<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Professores</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Cadastro de Professores</h1>
    <table>
        <tr>
            <th>Nome</th>
            <th>Disciplina</th>
            <th>Telefone</th>
        </tr>
        <tr>
            <td>Maria Silva</td>
            <td>Matemática</td>
            <td>(16) 99999-1111</td>
        </tr>
        <tr>
            <td>João Pereira</td>
            <td>História</td>
            <td>(16) 98888-2222</td>
        </tr>
        <tr>
            <td>Ana Souza</td>
            <td>Português</td>
            <td>(16) 97777-3333</td>
        </tr>
    </table>
</body>
</html>
