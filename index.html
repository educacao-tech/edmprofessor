<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Professores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-group">
            <img src="https://raw.githubusercontent.com/educacao-tech/edmprofessor/main/batatais.png" alt="Logo Batatais" class="header-logo">
            <img src="https://raw.githubusercontent.com/educacao-tech/edmprofessor/main/secretaria.png" alt="Logo Secretaria" class="header-logo">
            <img src="https://raw.githubusercontent.com/educacao-tech/edmprofessor/main/edm.png" alt="Logo EDM" class="header-logo">
        </div>
        <h1>Gestão de Professores</h1>
        <button id="btnAbrirCadastro" class="btn-menu">➕ Novo Professor</button>
    </header>

    <!-- Formulário de Cadastro -->
    <section id="registrationSection" class="hidden">
        <form id="professorForm">
            <button type="button" class="close-modal" id="closeModalBtn">&times;</button>
            <h3>Dados do Professor</h3>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Nome do Professor" required>

        <label for="escola">Escola:</label>
        <input type="text" id="escola" placeholder="Nome da Escola" required>

        <label for="disciplina">Disciplina:</label>
        <input type="text" id="disciplina" placeholder="Ex: Matemática" required>

        <label for="ano">Ano:</label>
        <select id="ano" required>
            <option value="" disabled selected>Selecione o Ano</option>
            <option value="1º">1º</option>
            <option value="2º">2º</option>
            <option value="3º">3º</option>
            <option value="4º">4º</option>
            <option value="5º">5º</option>
            <option value="N/A">N/A</option>
        </select>

        <label for="turma">Turma:</label>
        <select id="turma" required>
            <option value="" disabled selected>Selecione a Turma</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="N/A">N/A</option>
        </select>

        <label for="turno">Turno:</label>
        <input type="text" id="turno" placeholder="Ex: MANHÃ">

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" placeholder="(DDD) 99999-9999">

        <div class="form-actions">
            <button type="submit">Adicionar Professor</button>
            <button type="button" id="cancelBtn" class="btn-cancel" style="display: none;">Cancelar</button>
        </div>
        </form>
    </section>

    <!-- Campo de Busca -->
    <div class="search-container">
        <div class="filters-grid">
            <div class="filter-group search-group">
                <label for="searchInput">Busca Rápida:</label>
                <input type="text" id="searchInput" placeholder="NOME OU ESCOLA...">
            </div>
            
            <div class="filter-group">
                <label for="filterEscola">Escola:</label>
                <select id="filterEscola">
                    <option value="">TODAS</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterDisciplina">Disciplina:</label>
                <select id="filterDisciplina">
                    <option value="">TODAS</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterAno">Ano:</label>
                <select id="filterAno">
                    <option value="">TODAS</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterTurma">Turma:</label>
                <select id="filterTurma">
                    <option value="">TODAS</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filterTurno">Turno:</label>
                <select id="filterTurno">
                    <option value="">TODAS</option>
                </select>
            </div>
        </div>

        <div class="search-footer">
            <div id="contador" class="contador-vagas">
                Professores encontrados: 0
            </div>
            <div class="report-actions">
                <button type="button" id="btnDetailedReport" class="btn-report">Relatório Detalhado</button>
                <button type="button" id="btnToggleChart" class="btn-report">Ocultar Gráfico</button>
                <button type="button" id="btnLimparFiltros" class="btn-report">Limpar Filtros</button>
                <button type="button" id="btnExportar" class="btn-report">Exportar CSV</button>
                <button type="button" id="btnImprimir" class="btn-report">Imprimir Relatório</button>
            </div>
        </div>
    </div>

    <!-- Seção de Estatísticas -->
    <div id="statsSection" class="stats-container hidden">
        <h3>Distribuição por Escola</h3>
        <div id="chartContainer"></div>
    </div>

    <!-- Sentinela invisível para detectar o estado sticky do cabeçalho -->
    <div id="header-sentinel"></div>

    <!-- Tabela de Dados -->
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Escola</th>
                <th>Disciplina</th>
                <th>Ano</th>
                <th>Turma</th>
                <th>Turno</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <!-- Os dados aparecerão aqui dinamicamente via JavaScript -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
